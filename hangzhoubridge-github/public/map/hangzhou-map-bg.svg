<svg width="2560" height="1280" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="2560" height="1280" fill="#e8f4f8"/>

  <!-- Water bodies - Qiantang River -->
  <path d="M0,600 Q200,580 400,600 T800,620 T1200,650 T1600,680 T2000,700 T2400,720 L2560,720 L2560,680 L2400,670 Q2200,660 2000,650 T1600,630 T1200,610 T800,590 T400,580 L0,580 Z"
        fill="#a8d5e5" opacity="0.6"/>

  <!-- Grand Canal -->
  <path d="M100,400 L100,500 L150,550 L200,600 L250,650"
        stroke="#a8d5e5" stroke-width="30" fill="none" opacity="0.5"/>
  <path d="M600,200 L650,250 L700,300 L750,350 L800,400"
        stroke="#a8d5e5" stroke-width="20" fill="none" opacity="0.5"/>

  <!-- Urban areas -->
  <rect x="400" y="400" width="400" height="300" fill="#f5e6d3" opacity="0.3" rx="20"/>
  <rect x="900" y="350" width="300" height="250" fill="#f5e6d3" opacity="0.3" rx="20"/>
  <rect x="1300" y="450" width="350" height="280" fill="#f5e6d3" opacity="0.3" rx="20"/>

  <!-- Green spaces -->
  <circle cx="500" cy="300" r="40" fill="#7cb342" opacity="0.4"/>
  <circle cx="800" cy="450" r="35" fill="#7cb342" opacity="0.4"/>
  <circle cx="1100" cy="380" r="45" fill="#7cb342" opacity="0.4"/>
  <circle cx="1400" cy="500" r="38" fill="#7cb342" opacity="0.4"/>

  <!-- Grid lines for reference -->
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#ccc" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="2560" height="1280" fill="url(#grid)"/>

  <!-- City labels -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="24" fill="#555" opacity="0.6">杭州市中心</text>
  <text x="200" y="700" font-family="Arial, sans-serif" font-size="18" fill="#555" opacity="0.6">西湖</text>
  <text x="1600" y="650" font-family="Arial, sans-serif" font-size="18" fill="#555" opacity="0.6">钱塘江</text>
</svg>
