<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#F5F0E6"/>

  <!-- 装饰性水波纹 -->
  <path d="M0,450 Q100,440 200,450 T400,450 T600,450 T800,450 L800,600 L0,600 Z" fill="#E8F4F8" opacity="0.6"/>
  <path d="M0,480 Q100,470 200,480 T400,480 T600,480 T800,480 L800,600 L0,600 Z" fill="#D4E8ED" opacity="0.4"/>

  <!-- 简化的桥梁图形 -->
  <g transform="translate(400, 350)">
    <!-- 桥拱 -->
    <ellipse cx="0" cy="50" rx="150" ry="60" fill="none" stroke="#C41E3A" stroke-width="4"/>
    <ellipse cx="-100" cy="50" rx="60" ry="40" fill="none" stroke="#C41E3A" stroke-width="3"/>
    <ellipse cx="100" cy="50" rx="60" ry="40" fill="none" stroke="#C41E3A" stroke-width="3"/>

    <!-- 桥面 -->
    <rect x="-180" y="-10" width="360" height="15" fill="#C41E3A" rx="2"/>
    <line x1="-180" y1="-3" x2="180" y2="-3" stroke="#F5F0E6" stroke-width="2"/>

    <!-- 栏杆 -->
    <g fill="#C41E3A" opacity="0.8">
      <rect x="-170" y="-35" width="8" height="25" rx="1"/>
      <rect x="-120" y="-35" width="8" height="25" rx="1"/>
      <rect x="-70" y="-35" width="8" height="25" rx="1"/>
      <rect x="-20" y="-35" width="8" height="25" rx="1"/>
      <rect x="30" y="-35" width="8" height="25" rx="1"/>
      <rect x="80" y="-35" width="8" height="25" rx="1"/>
      <rect x="130" y="-35" width="8" height="25" rx="1"/>
    </g>
    <line x1="-175" y1="-38" x2="175" y2="-38" stroke="#C41E3A" stroke-width="3"/>
  </g>

  <!-- 桥梁名称 -->
  <text x="400" y="180" font-family="'Noto Serif SC', serif" font-size="48" font-weight="bold" fill="#C41E3A" text-anchor="middle">断桥</text>

  <!-- 年代标签 -->
  <rect x="340" y="200" width="120" height="30" rx="15" fill="#C41E3A"/>
  <text x="400" y="222" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">618年</text>

  <!-- 装饰元素 -->
  <circle cx="100" cy="100" r="40" fill="#C41E3A" opacity="0.1"/>
  <circle cx="700" cy="500" r="60" fill="#C41E3A" opacity="0.1"/>
  <circle cx="650" cy="100" r="30" fill="#C41E3A" opacity="0.08"/>
</svg>